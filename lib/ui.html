  const [diff, setDiff] = useState('');
  const [diffLoading, setDiffLoading] = useState(false);
  const [commitMsg, setCommitMsg] = useState('');
  const [checked, setChecked] = useState(new Set());
  const [committing, setCommitting] = useState(false);
  const [commitOk, setCommitOk] = useState(false);
  const [commitErr, setCommitErr] = useState('');

  useEffect(() => {
    let mounted = true;
    const load = () => {
      apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/git/status`, { cache: 'no-store' })
        .then(r => r.json())
        .then(d => { if (!mounted) return; setNotGit(!!d.notGit); setFiles(d.files || []); })
        .catch(() => {});
    };
    load();
    const t = setInterval(load, 5000);
    return () => { mounted = false; clearInterval(t); };
  }, [session.name]);

  useEffect(() => {
    if (!selectedFile) { setDiff(''); return; }
    setDiffLoading(true);
    apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/git/diff?file=${encodeURIComponent(selectedFile)}`, { cache: 'no-store' })
      .then(r => r.json())
      .then(d => { setDiff(d.diff || ''); setDiffLoading(false); })
      .catch(() => setDiffLoading(false));
  }, [session.name, selectedFile]);

  // Reset selected file when session changes
  useEffect(() => { setSelectedFile(null); setChecked(new Set()); setCommitMsg(''); }, [session.name]);

  const toggleCheck = (f) => setChecked(prev => { const n = new Set(prev); n.has(f) ? n.delete(f) : n.add(f); return n; });
  const toggleAll = () => setChecked(prev => prev.size === files.length ? new Set() : new Set(files.map(f => f.file)));

  const commit = async () => {
    if (!commitMsg.trim() || committing) return;
    setCommitting(true); setCommitErr('');
    try {
      const res = await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/git/commit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: commitMsg, files: checked.size ? [...checked] : [] }),
      });
      const d = await res.json();
      if (!res.ok) { setCommitErr(d.error || 'Commit failed'); return; }
      setCommitMsg(''); setChecked(new Set()); setSelectedFile(null); setDiff('');
      setCommitOk(true); setTimeout(() => setCommitOk(false), 2500);
      apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/git/status`, { cache: 'no-store' })
        .then(r => r.json()).then(d => setFiles(d.files || [])).catch(() => {});
    } finally { setCommitting(false); }
  };

  const statusMeta = (s) => {
    if (s === '??' || s === 'A') return { icon: '+', color: 'var(--success)' };
    if (s === 'D') return { icon: '−', color: 'var(--error)' };
    return { icon: '~', color: 'var(--warning)' };
  };

  const renderDiff = (text) => text.split('\n').map((line, i) => {
    let color = 'oklch(70% 0.015 70)', bg = 'transparent';
    if (line.startsWith('+') && !line.startsWith('+++')) { color = 'oklch(75% 0.14 145)'; bg = 'oklch(20% 0.06 145 / 0.35)'; }
    else if (line.startsWith('-') && !line.startsWith('---')) { color = 'oklch(70% 0.18 25)'; bg = 'oklch(20% 0.08 25 / 0.35)'; }
    else if (line.startsWith('@@')) { color = 'oklch(72% 0.12 250)'; }
    else if (line.startsWith('diff ') || line.startsWith('index ') || line.startsWith('---') || line.startsWith('+++')) { color = 'oklch(48% 0.015 70)'; }
    return <div key={i} style={{ color, background: bg, padding: '0 8px', fontFamily: 'var(--font-mono)', fontSize: 12, lineHeight: 1.5, whiteSpace: 'pre', minWidth: 'max-content' }}>{line || '​'}</div>;
  });

  // ── full-width tab layout ──────────────────────────────────────────────────
  if (fullWidth) {
    const panelH = 'calc(100vh - 280px)';
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, height: panelH }}>
        {/* Commit bar */}
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexShrink: 0 }}>
          <input
            className="form-input"
            placeholder={notGit ? 'Not a git repository' : files.length ? 'Commit message…' : 'Working tree clean'}
            value={commitMsg}
            onChange={e => setCommitMsg(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && commit()}
            disabled={!files.length || notGit}
            style={{ flex: 1, fontSize: 13 }}
          />
          <button
            className="btn btn-primary"
            onClick={commit}
            disabled={committing || !commitMsg.trim() || !files.length}
            style={{ whiteSpace: 'nowrap' }}
          >
            {commitOk ? '✓ Committed' : committing ? 'Committing…' : `↑ Commit${checked.size ? ` (${checked.size})` : ' all'}`}
          </button>
          {commitErr && <span style={{ fontSize: 12, color: 'var(--error)' }}>{commitErr}</span>}
        </div>

        {/* Two-column body */}
        <div style={{ flex: 1, minHeight: 0, display: 'grid', gridTemplateColumns: '260px 1fr', gap: 12 }}>
          {/* Left: file list */}
          <div style={{ display: 'flex', flexDirection: 'column', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)', overflow: 'hidden', background: 'var(--surface)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 12px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                {notGit ? 'No repo' : `${files.length} file${files.length !== 1 ? 's' : ''}`}
              </span>
              {files.length > 0 && (
                <button onClick={toggleAll} style={{ fontSize: 11, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--accent)', padding: 0 }}>
                  {checked.size === files.length ? 'Deselect all' : 'Select all'}
                </button>
              )}
            </div>
            <div style={{ flex: 1, overflow: 'auto' }}>
              {notGit && <div style={{ padding: 16, color: 'var(--muted)', fontSize: 12 }}>Not a git repository.</div>}
              {!notGit && files.length === 0 && <div style={{ padding: 16, color: 'var(--muted)', fontSize: 12 }}>Working tree clean.</div>}
              {files.map((f, i) => {
                const { icon, color } = statusMeta(f.status);
                const isSelected = selectedFile === f.file;
                return (
                  <div key={f.file} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 12px', background: isSelected ? 'var(--accent-soft)' : 'transparent', borderBottom: i < files.length - 1 ? '1px solid var(--border)' : 'none', cursor: 'pointer' }}
                    onClick={() => setSelectedFile(isSelected ? null : f.file)}>
                    <input type="checkbox" checked={checked.has(f.file)} onClick={e => e.stopPropagation()} onChange={() => toggleCheck(f.file)} style={{ cursor: 'pointer', flexShrink: 0, accentColor: 'var(--accent)' }} />
                    <span style={{ color, fontFamily: 'var(--font-mono)', fontSize: 12, flexShrink: 0, width: 14, textAlign: 'center', fontWeight: 700 }}>{icon}</span>
                    <span style={{ flex: 1, fontFamily: 'var(--font-mono)', fontSize: 12, color: isSelected ? 'var(--accent)' : 'var(--fg)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={f.file}>{f.file}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Right: diff viewer */}
          <div style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-md)', background: 'oklch(13% 0.012 50)', overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
            {!selectedFile && (
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'oklch(45% 0.015 70)', fontSize: 13, fontFamily: 'var(--font-mono)' }}>
                ← select a file to view diff
              </div>
            )}
            {selectedFile && diffLoading && (
              <div style={{ padding: 16, color: 'oklch(45% 0.015 70)', fontSize: 12, fontFamily: 'var(--font-mono)' }}>Loading…</div>
            )}
            {selectedFile && !diffLoading && !diff && (
              <div style={{ padding: 16, color: 'oklch(45% 0.015 70)', fontSize: 12, fontFamily: 'var(--font-mono)' }}>No diff available for this file.</div>
            )}
            {selectedFile && !diffLoading && diff && (
              <div style={{ padding: '8px 0' }}>{renderDiff(diff)}</div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── compact sidebar layout (fallback, not currently used) ──────────────────
  if (notGit || !files.length) return null;
  return (
    <div className="card" style={{ padding: '14px 16px', marginTop: 0 }}>
      <h3 style={{ marginBottom: 10 }}>Changes <span style={{ background: 'var(--accent-soft)', color: 'var(--accent)', fontFamily: 'var(--font-mono)', fontSize: 11, padding: '1px 6px', borderRadius: 8, fontWeight: 700, marginLeft: 4 }}>{files.length}</span></h3>
      <div style={{ marginBottom: 10, border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', overflow: 'hidden' }}>
        {files.map((f, i) => {
          const { icon, color } = statusMeta(f.status);
          const isSelected = selectedFile === f.file;
          return (
            <div key={f.file} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '5px 8px', background: isSelected ? 'var(--accent-soft)' : 'transparent', borderBottom: i < files.length - 1 ? '1px solid var(--border)' : 'none' }}>
              <input type="checkbox" checked={checked.has(f.file)} onChange={() => toggleCheck(f.file)} style={{ cursor: 'pointer', flexShrink: 0, accentColor: 'var(--accent)' }} />
              <span style={{ color, fontFamily: 'var(--font-mono)', fontSize: 11, flexShrink: 0, width: 12, textAlign: 'center' }}>{icon}</span>
              <button onClick={() => setSelectedFile(isSelected ? null : f.file)} style={{ flex: 1, background: 'none', border: 'none', cursor: 'pointer', color: isSelected ? 'var(--accent)' : 'var(--fg)', fontFamily: 'var(--font-mono)', fontSize: 11, textAlign: 'left', padding: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={f.file}>{f.file}</button>
            </div>
          );
        })}
      </div>
      {selectedFile && (
        <div style={{ marginBottom: 10, border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', background: 'oklch(12% 0.012 50)', overflow: 'auto', maxHeight: 280 }}>
          {diffLoading ? <div style={{ padding: 12, color: 'var(--muted)', fontSize: 11 }}>Loading…</div>
            : diff ? renderDiff(diff) : <div style={{ padding: 12, color: 'var(--muted)', fontSize: 11 }}>No diff</div>}
        </div>
      )}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <input className="form-input" placeholder="Commit message…" value={commitMsg} onChange={e => setCommitMsg(e.target.value)} onKeyDown={e => e.key === 'Enter' && commit()} style={{ fontSize: 12 }} />
        <button className="btn btn-sm btn-primary" onClick={commit} disabled={committing || !commitMsg.trim()}>
          {commitOk ? '✓ Committed' : committing ? 'Committing…' : `↑ Commit${checked.size ? ` (${checked.size})` : ' all'}`}
        </button>
        {commitErr && <div style={{ fontSize: 11, color: 'var(--error)', wordBreak: 'break-word' }}>{commitErr}</div>}
      </div>
    </div>
  );
}

/* --- Queue Panel --- */
function QueuePanel({ session }) {
  const isOffline = session.status === 'offline';
  const [items, setItems] = useState([]);
  const [autoFeed, setAutoFeed] = useState(false);
  const [input, setInput] = useState('');
  const [busy, setBusy] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    let mounted = true;
    const load = () => {
      apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/queue`, { cache: 'no-store' })
        .then(r => r.json())
        .then(d => { if (mounted) { setItems(d.items || []); setAutoFeed(!!d.autoFeed); } })
        .catch(() => {});
    };
    load();
    const t = setInterval(load, 3000);
    return () => { mounted = false; clearInterval(t); };
  }, [session.name]);

  const enqueue = async () => {
    const msg = input.trim();
    if (!msg || busy) return;
    setBusy(true);
    try {
      const res = await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/queue`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
      });
      const data = await res.json();
      if (res.ok) { setItems(prev => [...prev, data.item]); setInput(''); }
    } finally {
      setBusy(false);
      setTimeout(() => inputRef.current?.focus(), 0);
    }
  };

  const play = async () => {
    if (busy || !items.length || isOffline) return;
    setBusy(true);
    try {
      await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/queue/play`, { method: 'POST' });
      setItems(prev => prev.slice(1));
    } finally { setBusy(false); }
  };

  const remove = async (id) => {
    setItems(prev => prev.filter(it => it.id !== id));
    apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/queue/${id}`, { method: 'DELETE' }).catch(() => {});
  };

  const toggleAutoFeed = async () => {
    if (isOffline) return;
    const next = !autoFeed;
    setAutoFeed(next);
    apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/queue`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ autoFeed: next }),
    }).catch(() => setAutoFeed(!next));
  };

  return (
    <div className="card" style={{ padding: '14px 18px', marginTop: 16 }}>
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 12 }}>
        <span style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--muted)', display: 'flex', alignItems: 'center', gap: 6 }}>
          Queue
          {items.length > 0 && (
            <span style={{ background: 'var(--accent-soft)', color: 'var(--accent)', fontFamily: 'var(--font-mono)', fontSize: 11, padding: '1px 6px', borderRadius: 8, fontWeight: 700 }}>
              {items.length}
            </span>
          )}
        </span>
        <button
          onClick={toggleAutoFeed}
          disabled={isOffline}
          title={isOffline ? 'Start session to enable auto-feed' : autoFeed ? 'Auto-feed: sends next message when session goes idle' : 'Enable auto-feed'}
          style={{
            marginLeft: 'auto', fontSize: 11, padding: '3px 8px', borderRadius: 6, cursor: isOffline ? 'not-allowed' : 'pointer', fontWeight: 600,
            border: `1px solid ${autoFeed && !isOffline ? 'var(--success)' : 'var(--border)'}`,
            background: autoFeed && !isOffline ? 'var(--success-soft)' : 'var(--bg)',
            color: autoFeed && !isOffline ? 'var(--success)' : 'var(--muted)',
            opacity: isOffline ? 0.5 : 1,
          }}
        >
          {autoFeed && !isOffline ? '⚡ Auto-feed on' : 'Auto-feed off'}
        </button>
      </div>

      {items.length === 0 && (
        <div style={{ fontSize: 12, color: 'var(--muted)', textAlign: 'center', padding: '8px 0 12px' }}>No messages queued</div>
      )}

      {items.length > 0 && (
        <div style={{ marginBottom: 12, border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', overflow: 'hidden' }}>
          {items.map((item, i) => (
            <div key={item.id} style={{
              display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px',
              background: i === 0 ? 'var(--accent-soft)' : 'transparent',
              borderBottom: i < items.length - 1 ? '1px solid var(--border)' : 'none',
            }}>
              {i === 0 ? (
                <button
                  onClick={play}
                  disabled={busy || isOffline}
                  title={isOffline ? 'Session offline' : 'Send now'}
                  style={{ background: 'none', border: 'none', cursor: busy || isOffline ? 'not-allowed' : 'pointer', color: isOffline ? 'var(--muted)' : 'var(--success)', fontSize: 13, padding: 0, flexShrink: 0, opacity: isOffline ? 0.4 : 1 }}
                >▶</button>
              ) : (
                <span style={{ width: 16, flexShrink: 0, textAlign: 'center', fontSize: 11, color: 'var(--muted)', fontFamily: 'var(--font-mono)' }}>{i + 1}</span>
              )}
              <span style={{ flex: 1, fontSize: 12, fontFamily: 'var(--font-mono)', color: i === 0 ? 'var(--fg)' : 'var(--fg-secondary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                {item.message}
              </span>
              <button
                onClick={() => remove(item.id)}
                title="Remove"
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)', fontSize: 13, padding: 0, flexShrink: 0, lineHeight: 1 }}
              >✕</button>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8 }}>
        <input
          ref={inputRef}
          className="form-input"
          placeholder="Type a message to queue…"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && enqueue()}
          style={{ flex: 1, fontSize: 12 }}
        />
        <button className="btn btn-sm btn-primary" onClick={enqueue} disabled={busy || !input.trim()}>
          + Enqueue
        </button>
      </div>
    </div>
  );
}

/* --- App --- */
function App() {
  const savedTheme = storage.getItem('ccp-theme');
  const [dark, setDark] = useState(savedTheme === 'dark');
  const [sortBy, setSortByState] = useState(storage.getItem('ccp-sort') || 'active');
  const setSortBy = (v) => { setSortByState(v); storage.setItem('ccp-sort', v); };
  const [snippetLines, setSnippetLinesState] = useState(() => {
    const v = parseInt(storage.getItem('ccp-snippet-lines') ?? '4', 10);
    return [0, 2, 4, 6, 8].includes(v) ? v : 4;
  });
  const [soundOn, setSoundOnState] = useState(storage.getItem('ccp-sound') !== 'off');
  const soundOnRef = useRef(soundOn);
  const setSoundOn = (v) => { setSoundOnState(v); soundOnRef.current = v; storage.setItem('ccp-sound', v ? 'on' : 'off'); };
  const setSnippetLines = (v) => { setSnippetLinesState(v); storage.setItem('ccp-snippet-lines', String(v)); };
  const [telegramEnabled, setTelegramEnabled] = useState(true);
  const [hasTelegram, setHasTelegram] = useState(false);
  const [screen, setScreen] = useState('dashboard');
  const [selectedSession, setSelectedSession] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [sessions, setSessions] = useState([]);
  const [serverStatus, setServerStatus] = useState(null);
  const [activity, setActivity] = useState([]);
  const [connected, setConnected] = useState(false);
  const [needsLogin, setNeedsLogin] = useState(false);
  const prevStatusRef = useRef({});
  const esRef = useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    storage.setItem('ccp-theme', dark ? 'dark' : 'light');
  }, [dark]);

  // Wire up unauth callback
  useEffect(() => {
    _onUnauth = () => setNeedsLogin(true);
    return () => { _onUnauth = () => {}; };
  }, []);

  // Request browser notification permission on first load
  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, []);

  const connectSSE = useCallback(() => {
    if (esRef.current) esRef.current.close();
    const es = new EventSource(sseUrl());
    esRef.current = es;
    es.onopen = () => setConnected(true);
    es.onerror = () => {
      setConnected(false);
      es.close();
      setTimeout(connectSSE, 5000);
    };
    es.onmessage = (e) => {
      const incoming = JSON.parse(e.data);
      setSessions(incoming);
      const now = new Date();
      const prev = prevStatusRef.current;
      const newEntries = [];
      for (const s of incoming) {
        if (prev[s.name] && prev[s.name] !== s.status) {
          newEntries.push({ time: now, name: s.name, from: prev[s.name], to: s.status });
          if (s.status === 'needs-response' || s.status === 'limit') {
            if ('Notification' in window && Notification.permission === 'granted') {
              new Notification(`Claude Pilot — ${s.name}`, {
                body: s.status === 'needs-response' ? 'Claude needs your input' : 'Usage limit hit — will auto-resume',
                tag: `ccp-${s.name}-${s.status}`,
              });
            }
            if (soundOnRef.current && s.status === 'needs-response') playBeep();
          }
        }
        prev[s.name] = s.status;
      }
      if (newEntries.length) setActivity(a => [...newEntries, ...a].slice(0, 20));
      setSelectedSession(sel => {
        if (!sel) return sel;
        return incoming.find(s => s.name === sel.name) || sel;
      });
    };
  }, []);

  useEffect(() => {
    // Check auth / fetch status
    apiFetch('/api/status')
      .then(r => r.json())
      .then(data => { setServerStatus(data); setNeedsLogin(false); connectSSE(); })
      .catch(e => { if (e.message !== 'Unauthorized') connectSSE(); });
    apiFetch('/api/settings')
      .then(r => r.json())
      .then(d => { setTelegramEnabled(d.telegramEnabled); setHasTelegram(d.hasTelegram); })
      .catch(() => {});
    return () => { if (esRef.current) esRef.current.close(); };
  }, []);

  // Fallback polling — loads sessions immediately and keeps them fresh when
  // SSE is blocked (e.g. through a Cloudflare tunnel that buffers streams).
  useEffect(() => {
    let mounted = true;
    const poll = () => {
      apiFetch('/api/sessions', { cache: 'no-store' })
        .then(r => r.json())
        .then(data => { if (mounted) setSessions(data); })
        .catch(() => {});
    };
    poll();
    const t = setInterval(poll, 5000);
    return () => { mounted = false; clearInterval(t); };
  }, []);

  const handleLogin = useCallback(() => {
    setNeedsLogin(false);
    apiFetch('/api/status').then(r => r.json()).then(setServerStatus).catch(() => {});
    connectSSE();
  }, [connectSSE]);

  const handleTelegramToggle = useCallback((enabled) => {
    setTelegramEnabled(enabled);
    apiFetch('/api/settings', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telegramEnabled: enabled }),
    }).catch(() => {});
  }, []);

  const navigate = useCallback((target, session) => {
    setScreen(target);
    if (session) setSelectedSession(session);
    setSidebarOpen(false);
  }, []);

  if (needsLogin) return <LoginScreen onLogin={handleLogin} />;

  const screenTitle = { dashboard: 'Dashboard', sessions: 'Sessions', create: 'New Session', detail: selectedSession?.name || 'Session' }[screen] || 'Dashboard';

  const renderScreen = () => {
    switch (screen) {
      case 'dashboard': return <DashboardScreen onNavigate={navigate} sessions={sessions} activity={activity} serverStatus={serverStatus} sortBy={sortBy} onSortChange={setSortBy} snippetLines={snippetLines} onSnippetChange={setSnippetLines} telegramEnabled={telegramEnabled} hasTelegram={hasTelegram} onTelegramToggle={handleTelegramToggle} soundOn={soundOn} onSoundToggle={setSoundOn} />;
      case 'sessions':  return <SessionsScreen sessions={sessions} onNavigate={navigate} sortBy={sortBy} onSortChange={setSortBy} />;
      case 'create':    return <CreateSessionScreen onBack={() => navigate('dashboard')} onCreated={s => navigate('detail', s)} />;
      case 'detail':    return <SessionDetailScreen session={selectedSession} onBack={() => navigate('dashboard')} onKilled={() => navigate('sessions')} onRespawned={(respawned) => {
        setSessions(prev => {
          const next = prev.filter(s => s.name !== respawned.name);
          return [{ ...respawned, id: respawned.name }, ...next];
        });
        setSelectedSession({ ...respawned, id: respawned.name });
      }} />;
      default:          return <DashboardScreen onNavigate={navigate} sessions={sessions} activity={activity} serverStatus={serverStatus} />;
    }
  };

  return (
    <div className="app-shell">
      <Sidebar currentScreen={screen} onNavigate={navigate} sessionCount={sessions.length} open={sidebarOpen} onClose={() => setSidebarOpen(false)} connected={connected} />
      <div className="main">
        <div className="mobile-header">
          <button className="menu-btn" onClick={() => setSidebarOpen(true)}>{Icons.menu}</button>
          <span className="mobile-title">{screenTitle}</span>
          <a href="https://www.buymeacoffee.com/mekkunks" target="_blank" rel="noopener noreferrer" title="Buy me a coffee"
            style={{ fontSize: 18, textDecoration: 'none', lineHeight: 1 }}>☕</a>
          <button className="theme-toggle" onClick={() => setDark(d => !d)}>{dark ? Icons.sun : Icons.moon}</button>
        </div>
        <header className="header">
          <h1 className="header-title">{screenTitle}</h1>
          <div className="header-spacer" />
          <a href="https://www.buymeacoffee.com/mekkunks" target="_blank" rel="noopener noreferrer"
            style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '5px 12px', borderRadius: 6, background: '#FFDD00', color: '#000', fontSize: 12, fontWeight: 600, textDecoration: 'none', whiteSpace: 'nowrap' }}>
            ☕ Buy me a coffee
          </a>
          <button className="theme-toggle" onClick={() => setDark(d => !d)}>{dark ? Icons.sun : Icons.moon} {dark ? 'Light' : 'Dark'}</button>
        </header>
        <div className="content">{renderScreen()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
