<!doctype html>
<html lang="en">

  function makeStore(){var data={};var api={getItem:function(k){return Object.prototype.hasOwnProperty.call(data,k)?data[k]:null;},setItem:function(k,v){data[k]=String(v);},removeItem:function(k){delete data[k];},clear:function(){data={};},key:function(i){return Object.keys(data)[i]||null;}};Object.defineProperty(api,'length',{get:function(){return Object.keys(data).length;}});return api;}
  function tryShim(name){var works=false;try{works=!!window[name]&&typeof window[name].getItem==='function';void window[name].length;}catch(_){works=false;}if(works)return;try{Object.defineProperty(window,name,{configurable:true,value:makeStore()});}catch(_){try{window[name]=makeStore();}catch(__){}}};

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code Pilot — Dashboard</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

  :root {
    --bg:      oklch(97% 0.018 70);
    --surface: oklch(99% 0.008 70);
    --surface-hover: oklch(96% 0.016 70);
    --fg:      oklch(22% 0.02 50);
    --fg-secondary: oklch(35% 0.022 50);
    --muted:   oklch(50% 0.018 50);
    --border:  oklch(90% 0.014 70);
    --accent:  oklch(64% 0.13 28);
    --accent-soft: oklch(64% 0.13 28 / 0.08);
    --success: oklch(62% 0.14 145);
    --success-soft: oklch(62% 0.14 145 / 0.1);
    --warning: oklch(68% 0.16 75);
    --warning-soft: oklch(68% 0.16 75 / 0.1);
    --error:   oklch(58% 0.20 25);
    --error-soft: oklch(58% 0.20 25 / 0.1);
    --idle:    oklch(55% 0.018 250);
    --idle-soft: oklch(55% 0.018 250 / 0.1);
    --font-display: 'Newsreader','Iowan Old Style',Georgia,serif;
    --font-body:    -apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
    --font-mono:    'SF Mono','JetBrains Mono',ui-monospace,Menlo,monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 2px oklch(22% 0.02 50 / 0.04);
    --shadow-md: 0 2px 8px oklch(22% 0.02 50 / 0.06);
    --shadow-inner: inset 0 1px 3px oklch(22% 0.02 50 / 0.04);
    --sidebar-w: 240px;
    --header-h: 56px;
  }

  [data-theme="dark"] {
    --bg:      oklch(18% 0.018 50);
    --surface: oklch(22% 0.02 50);
    --surface-hover: oklch(26% 0.022 50);
    --fg:      oklch(95% 0.008 70);
    --fg-secondary: oklch(75% 0.012 70);
    --muted:   oklch(55% 0.018 50);
    --border:  oklch(32% 0.02 50);
    --accent:  oklch(70% 0.14 32);
    --accent-soft: oklch(70% 0.14 32 / 0.12);
    --success: oklch(68% 0.15 150);
    --success-soft: oklch(68% 0.15 150 / 0.12);
    --warning: oklch(72% 0.16 78);
    --warning-soft: oklch(72% 0.16 78 / 0.12);
    --error:   oklch(64% 0.20 28);
    --error-soft: oklch(64% 0.20 28 / 0.12);
    --idle:    oklch(60% 0.018 250);
    --idle-soft: oklch(60% 0.018 250 / 0.12);
    --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.2);
    --shadow-md: 0 2px 8px oklch(0% 0 0 / 0.25);
    --shadow-inner: inset 0 1px 3px oklch(0% 0 0 / 0.15);
  }

  body{font-family:var(--font-body);background:var(--bg);color:var(--fg);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased;}
  #root{height:100vh;display:flex;flex-direction:column;}
  .app-shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  .sidebar{position:fixed;top:0;left:0;width:100%;height:auto;max-height:85vh;background:var(--surface);border-bottom:1px solid var(--border);z-index:100;transform:translateY(-100%);transition:transform 0.25s ease;border-radius:0 0 var(--radius-lg) var(--radius-lg);overflow-y:auto;}
  .sidebar.open{transform:translateY(0);}
  .sidebar-overlay{position:fixed;inset:0;background:oklch(0% 0 0 / 0.3);z-index:99;opacity:0;pointer-events:none;transition:opacity 0.25s ease;}
  .sidebar-overlay.open{opacity:1;pointer-events:auto;}
  .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .sidebar-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--fg);}
  .logo-mark{width:28px;height:28px;background:var(--accent);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--surface);font-weight:700;font-size:13px;}
  .logo-text{font-family:var(--font-display);font-size:16px;font-weight:600;letter-spacing:-0.01em;}
  .logo-badge{font-size:10px;font-family:var(--font-mono);color:var(--muted);background:var(--accent-soft);padding:2px 6px;border-radius:4px;}
  .sidebar-nav{padding:12px 10px;}
  .nav-section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);padding:8px 8px 4px;margin-top:8px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-sm);color:var(--fg-secondary);cursor:pointer;font-size:14px;font-weight:500;transition:background 0.15s,color 0.15s;user-select:none;border:none;background:none;width:100%;text-align:left;}
  .nav-item:hover{background:var(--surface-hover);color:var(--fg);}
  .nav-item.active{background:var(--accent-soft);color:var(--fg);font-weight:600;}
  .nav-icon{width:18px;height:18px;opacity:0.7;flex-shrink:0;}
  .nav-item.active .nav-icon{opacity:1;}
  .nav-count{margin-left:auto;font-size:11px;font-family:var(--font-mono);color:var(--muted);background:var(--surface-hover);padding:1px 6px;border-radius:10px;min-width:20px;text-align:center;}
  .sidebar-footer{padding:12px 10px;border-top:1px solid var(--border);margin-top:auto;}

  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .mobile-header{height:var(--header-h);border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
  .menu-btn{background:none;border:none;cursor:pointer;color:var(--fg);padding:6px;display:flex;}
  .header{height:var(--header-h);border-bottom:1px solid var(--border);background:var(--surface);display:none;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
  .mobile-title{font-family:var(--font-display);font-size:15px;font-weight:600;flex:1;}
  .header-title{font-family:var(--font-display);font-size:15px;font-weight:600;}
  .header-spacer{flex:1;}
  .theme-toggle{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--fg-secondary);cursor:pointer;font-size:12px;font-family:var(--font-body);transition:border-color 0.15s;}
  .theme-toggle:hover{border-color:var(--muted);}

  .content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;}

  .session-cards{display:grid;grid-template-columns:1fr;gap:12px;}
  .session-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;min-width:0;}
  .session-card:hover{border-color:var(--muted);box-shadow:var(--shadow-md);}
  .session-card.offline{opacity:0.6;}
  .session-card-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .session-card-name{font-weight:600;font-size:14px;color:var(--fg);line-height:1.3;}
  .session-card-meta{font-size:12px;color:var(--muted);margin-top:4px;}
  .session-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--surface-hover);font-size:22px;line-height:1;user-select:none;}
  .emoji-picker-grid{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
  .emoji-picker-btn{font-size:20px;padding:3px 5px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--bg);line-height:1;transition:border-color 0.12s,background 0.12s;}
  .emoji-picker-btn.selected{border-color:var(--accent);background:var(--accent-soft);}
  .emoji-picker-btn:hover{border-color:var(--muted);}
  .session-card-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .session-card-field{font-size:11px;}
  .session-card-field-label{color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px;}
  .session-card-field-value{font-family:var(--font-mono);font-size:12px;color:var(--fg-secondary);}

  .status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;font-family:var(--font-mono);letter-spacing:0.02em;flex-shrink:0;}
  .status-dot{width:6px;height:6px;border-radius:50%;}
  .status-running{background:var(--success-soft);color:var(--success);}
  .status-running .status-dot{background:var(--success);}
  .status-idle{background:var(--idle-soft);color:var(--idle);}
  .status-idle .status-dot{background:var(--idle);}
  .status-error{background:var(--error-soft);color:var(--error);}
  .status-error .status-dot{background:var(--error);}
  .status-warn{background:var(--warning-soft);color:var(--warning);}
  .status-warn .status-dot{background:var(--warning);}
  @keyframes ccp-blink{0%,100%{opacity:1}50%{opacity:0.25}}
  .status-pill.blink{animation:ccp-blink 1s ease-in-out infinite;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--fg);transition:background 0.15s,border-color 0.15s;white-space:nowrap;}
  .btn:hover{background:var(--surface-hover);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:oklch(99% 0.008 70);border-color:var(--accent);}
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-sm{padding:4px 10px;font-size:12px;}

  /* Terminal — flex column so body grows and footer stays pinned */
  .terminal{background:oklch(14% 0.015 50);color:oklch(82% 0.015 70);font-family:var(--font-mono);font-size:13px;line-height:1.6;border-radius:var(--radius-md);overflow:hidden;border:1px solid oklch(28% 0.02 50);display:flex;flex-direction:column;}
  .terminal-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:oklch(18% 0.018 50);border-bottom:1px solid oklch(28% 0.02 50);flex-shrink:0;}
  .terminal-dot{width:10px;height:10px;border-radius:50%;}
  .terminal-title{font-size:12px;color:oklch(65% 0.018 50);margin-left:8px;}
  .terminal-body{flex:1;min-height:0;padding:16px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;font-family:var(--font-mono);font-size:12px;line-height:1.5;}
  .terminal-footer{display:flex;align-items:flex-end;gap:8px;padding:8px 14px;background:oklch(18% 0.018 50);border-top:1px solid oklch(28% 0.02 50);flex-shrink:0;}
  .terminal-input-row{display:flex;align-items:flex-end;gap:8px;flex:1;min-width:0;}
  .terminal-keys{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .terminal-prompt-char{color:oklch(72% 0.16 145);font-family:var(--font-mono);font-size:13px;flex-shrink:0;line-height:1;padding-bottom:2px;}
  .terminal-input{flex:1;background:transparent;border:none;outline:none;color:oklch(82% 0.015 70);font-family:var(--font-mono);font-size:12px;padding:2px 0;min-width:0;resize:none;overflow-y:hidden;line-height:1.5;max-height:120px;}
  .terminal-input::placeholder{color:oklch(42% 0.018 50);}
  .btn-key{background:oklch(26% 0.02 50);border:1px solid oklch(35% 0.02 50);color:oklch(65% 0.018 50);font-family:var(--font-mono);font-size:11px;padding:2px 7px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:background 0.12s;}
  .btn-key:hover{background:oklch(32% 0.02 50);color:oklch(78% 0.018 50);}
  .btn-key-send{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .btn-key-send:hover{background:var(--accent);color:#fff;}
  .btn-key-send:disabled{opacity:0.3;cursor:default;}

  .form-group{margin-bottom:18px;}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--fg);margin-bottom:6px;}
  .form-hint{font-size:11px;color:var(--muted);margin-top:4px;}
  .form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);font-size:13px;font-family:var(--font-body);transition:border-color 0.15s;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .form-textarea{resize:vertical;min-height:80px;}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:20px;border-top:1px solid var(--border);margin-top:8px;}

  .sysinfo-bar{display:flex;align-items:center;gap:16px;padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:14px;flex-wrap:wrap;}
  .sysinfo-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--fg-secondary);font-family:var(--font-mono);}
  .sysinfo-label{color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;font-size:10px;font-family:var(--font-body);}
  .sysinfo-bar-track{width:56px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .sysinfo-bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}
  .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .stat-card{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-inner);}
  .stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:3px;}
  .stat-value{font-size:18px;font-weight:700;font-family:var(--font-display);color:var(--fg);line-height:1.2;}
  .stat-sub{font-size:10px;color:var(--muted);margin-top:2px;}

  .activity-list{list-style:none;}
  .activity-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .activity-item:last-child{border-bottom:none;}
  .activity-time{font-size:11px;color:var(--muted);font-family:var(--font-mono);white-space:nowrap;margin-top:2px;}
  .activity-text{color:var(--fg-secondary);}
  .activity-text strong{color:var(--fg);font-weight:600;}

  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-family:var(--font-display);font-size:15px;font-weight:600;}

  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:6px;font-weight:500;border:none;background:none;padding:0;font-family:var(--font-body);}
  .back-link:hover{color:var(--fg);}

  .detail-header{display:flex;flex-direction:column;align-items:flex-start;gap:12px;margin-bottom:6px;}
  .detail-title{font-family:var(--font-display);font-size:18px;font-weight:600;line-height:1.3;}
  .detail-meta{font-size:12px;color:var(--muted);margin-top:4px;}
  .detail-actions{display:flex;gap:8px;flex-wrap:wrap;}

  .detail-grid{display:grid;grid-template-columns:1fr;gap:16px;}
  .detail-sidebar{display:flex;flex-direction:column;gap:0;overflow-y:auto;}
  .detail-sidebar .card{padding:16px;}
  .detail-sidebar h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:12px;}
  .tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;gap:0;}
  .tab-btn{padding:7px 16px;font-size:13px;font-weight:500;font-family:var(--font-body);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;color:var(--fg-secondary);transition:color 0.15s,border-color 0.15s;display:flex;align-items:center;gap:6px;}
  .tab-btn.active{color:var(--fg);border-bottom-color:var(--accent);}
  .tab-btn:hover{color:var(--fg);}
  .tab-badge{background:var(--accent-soft);color:var(--accent);font-family:var(--font-mono);font-size:10px;padding:1px 5px;border-radius:8px;font-weight:700;}

  .info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;}
  .info-label{color:var(--muted);}
  .info-value{font-weight:600;font-family:var(--font-mono);}

  .empty-state{text-align:center;padding:48px 24px;color:var(--muted);}
  .empty-state-icon{font-size:32px;margin-bottom:12px;opacity:0.5;}
  .empty-state-title{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--fg-secondary);margin-bottom:6px;}
  .empty-state-desc{font-size:13px;}

  .create-layout{max-width:640px;}

  /* Login screen */
  .login-wrap{display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg);}
  .login-card{width:320px;padding:32px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);}
  .login-logo{text-align:center;margin-bottom:24px;}
  .login-mark{width:44px;height:44px;background:var(--accent);border-radius:var(--radius-sm);display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;margin-bottom:12px;}
  .login-title{font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:4px;}
  .login-sub{font-size:13px;color:var(--muted);}

  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;}
  .conn-dot.disconnected{background:var(--error);}

  .content::-webkit-scrollbar{width:6px;}
  .content::-webkit-scrollbar-track{background:transparent;}
  .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .terminal-body::-webkit-scrollbar{width:6px;}
  .terminal-body::-webkit-scrollbar-track{background:transparent;}
  .terminal-body::-webkit-scrollbar-thumb{background:oklch(30% 0.02 50);border-radius:3px;}

  /* Menu CTA strip — numbered choice buttons that appear above the input */
  .menu-cta-strip{display:flex;flex-direction:column;gap:4px;padding:8px 14px;background:oklch(16% 0.015 50);border-top:1px solid oklch(28% 0.02 50);flex-shrink:0;}
  .menu-cta-btn{display:flex;width:100%;align-items:center;gap:7px;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid oklch(38% 0.02 50);background:oklch(22% 0.018 50);color:oklch(82% 0.015 70);font-family:var(--font-mono);font-size:12px;cursor:pointer;transition:background 0.12s,border-color 0.12s,opacity 0.12s;}
  .menu-cta-btn:hover:not(:disabled){background:oklch(28% 0.02 50);border-color:var(--accent);}
  .menu-cta-btn:disabled{cursor:default;opacity:0.45;}
  .menu-cta-btn.hit{border-color:oklch(55% 0.18 145);color:oklch(72% 0.18 145);opacity:1;}
  .menu-cta-btn.hit .menu-cta-num{color:oklch(72% 0.18 145);}
  .menu-cta-num{font-weight:700;color:var(--accent);flex-shrink:0;}
  .menu-cta-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}

  /* Mobile touch targets and layout fixes */
  @media (max-width:767px) {
    .section-header{flex-direction:column;align-items:flex-start;gap:10px;}
    .section-header > div{width:100%;flex-wrap:wrap;}
    .menu-cta-btn{min-height:44px;font-size:13px;}
    .terminal-footer{flex-direction:column;align-items:stretch;gap:6px;padding:8px 10px;}
    .terminal-input-row{width:100%;}
    .terminal-keys{overflow-x:auto;padding-bottom:2px;}
    .btn-key{min-height:36px;padding:3px 9px;font-size:11px;}
    .terminal-input{font-size:16px;} /* prevent iOS zoom on focus */
    .detail-actions{display:none;}
    .detail-header{display:none;}
    .terminal-footer.mobile-fixed{position:fixed;bottom:0;left:0;right:0;z-index:50;border-radius:0;}
    .terminal-header{display:none;}
    .terminal-fsz-btn{background:oklch(26% 0.02 50);border:1px solid oklch(35% 0.02 50);color:oklch(65% 0.018 50);font-size:10px;padding:2px 7px;border-radius:3px;cursor:pointer;line-height:1.5;}

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* --- Safe storage --- */
const memStore = new Map();
const storage = {
  getItem(key) { try { return localStorage.getItem(key); } catch { return memStore.has(key) ? memStore.get(key) : null; } },
  setItem(key, val) { try { localStorage.setItem(key, val); } catch { memStore.set(key, val); } },
};

/* --- Session customization --- */
const CARD_COLORS = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#a855f7', '#ec4899'];
const EMOJI_PRESETS = ['🔧','🚀','💡','🐛','🔬','📦','✨','🎯','🏗️','🔍','💾','🧪'];

function EmojiPicker({ value, onChange }) {
  return (
    <div>
      <div className="emoji-picker-grid">
        {EMOJI_PRESETS.map(e => (
          <button key={e} className={`emoji-picker-btn${value === e ? ' selected' : ''}`}
            onClick={() => onChange(value === e ? '' : e)} title={e}>{e}</button>
        ))}
      </div>
      <input
        value={EMOJI_PRESETS.includes(value) ? '' : value}
        onChange={e => onChange(e.target.value)}
        maxLength={8} placeholder="or type…"
        style={{ width: '100%', padding: '4px 8px', fontSize: 13, border: '1px solid var(--border)', borderRadius: 4, background: 'var(--bg)', color: 'var(--fg)' }}
      />
    </div>
  );
}

const STATUS_SORT_ORDER = { running: 0, 'needs-response': 1, idle: 2, limit: 3, offline: 4, ended: 5 };
const ACTIVE_GROUP_ORDER = { 'needs-response': 0, running: 0, idle: 1, limit: 2, offline: 2, ended: 2 };
function sortSessions(sessions, by) {
  if (by === 'name') return [...sessions].sort((a, b) => a.name.localeCompare(b.name));
  if (by === 'active') return [...sessions].sort((a, b) => {
    const ag = ACTIVE_GROUP_ORDER[a.status] ?? 3, bg = ACTIVE_GROUP_ORDER[b.status] ?? 3;
    if (ag !== bg) return ag - bg;
    if (ag === 1) return (b.lastActiveAt || 0) - (a.lastActiveAt || 0); // idle: most recently active first
    return a.name.localeCompare(b.name);
  });
  return [...sessions].sort((a, b) => {
    const ao = STATUS_SORT_ORDER[a.status] ?? 9, bo = STATUS_SORT_ORDER[b.status] ?? 9;
    return ao !== bo ? ao - bo : a.name.localeCompare(b.name);
  });
}

/* --- Auth module-level helpers --- */
let _authToken = storage.getItem('ccp-token') || '';
let _onUnauth = () => {};

function setAuthToken(t) {
  _authToken = t;
  storage.setItem('ccp-token', t || '');
}

function apiFetch(url, opts = {}) {
  const headers = { ...opts.headers };
  if (_authToken) headers['Authorization'] = `Bearer ${_authToken}`;
  return fetch(url, { ...opts, headers }).then(res => {
    if (res.status === 401) {
      setAuthToken('');
      _onUnauth();
      throw new Error('Unauthorized');
    }
    return res;
  });
}

function sseUrl() {
  return _authToken ? `/events?token=${encodeURIComponent(_authToken)}` : '/events';
}

/* --- Formatters --- */
function relativeTime(dateStr) {
  if (!dateStr) return '—';
  const secs = Math.max(0, Math.floor((Date.now() - new Date(dateStr)) / 1000));
  if (secs < 60) return `${secs}s ago`;
  if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs / 3600)}h ${Math.floor((secs % 3600) / 60)}m ago`;
  return `${Math.floor(secs / 86400)}d ago`;
}

function formatUptime(startedAt) {
  if (!startedAt) return '—';
  const secs = Math.max(0, Math.floor((Date.now() - new Date(startedAt)) / 1000));
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function formatTokens(tokens) {
  if (!tokens) return '—';
  return `↑${tokens.sent} ↓${tokens.received}`;
}

function statusCls(status) {
  switch (status) {
    case 'running': return 'status-running';
    case 'needs-response': return 'status-warn';
    case 'limit': return 'status-warn';
    case 'idle': return 'status-idle';
    default: return 'status-idle';
  }
}

function statusLabel(s) {
  return s === 'needs-response' ? 'needs input' : s;
}

/* --- ANSI → HTML renderer --- */
function ansiToHtml(raw) {
  // Strip cursor-movement / other non-SGR sequences
  const text = raw
    .replace(/\x1b\[[0-9;]*[ABCDEFGHJKSTfunsu]/g, '')
    .replace(/\x1b[()][AB012]/g, '')
    .replace(/\x1b[=<>]/g, '');

  const PALETTE = [
    '#1a1a1a','#cc3333','#4e9a06','#c4a000','#3465a4','#75507b','#06989a','#d3d7cf',
    '#7f7f7f','#ef2929','#8ae234','#fce94f','#729fcf','#ad7fa8','#34e2e2','#eeeeec',
  ];
  function p256(n) {
    if (n < 16) return PALETTE[n];
    if (n >= 232) { const v = 8 + (n - 232) * 10; return `rgb(${v},${v},${v})`; }
    const i = n - 16, r = Math.floor(i/36)*51, g = Math.floor((i%36)/6)*51, b = (i%6)*51;
    return `rgb(${r},${g},${b})`;
  }
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let result = '', last = 0, attrs = {}, spanOpen = false;
  function styleStr() {
    const p = [];
    if (attrs.fg) p.push(`color:${attrs.fg}`);
    if (attrs.bg) p.push(`background:${attrs.bg}`);
    if (attrs.bold) p.push('font-weight:700');
    if (attrs.dim) p.push('opacity:0.55');
    if (attrs.italic) p.push('font-style:italic');
    if (attrs.ul) p.push('text-decoration:underline');
    return p.join(';');
  }
  function emitText(txt) {
    if (!txt) return;
    const s = styleStr();
    if (s) { if (spanOpen) result += '</span>'; result += `<span style="${s}">`; spanOpen = true; }
    else if (spanOpen) { result += '</span>'; spanOpen = false; }
    result += esc(txt);
  }

  const SGR = /\x1b\[([0-9;]*)m/g;
  let m;
  SGR.lastIndex = 0;
  while ((m = SGR.exec(text)) !== null) {
    emitText(text.slice(last, m.index));
    last = m.index + m[0].length;
    const codes = m[1] ? m[1].split(';').map(Number) : [0];
    let i = 0;
    while (i < codes.length) {
      const c = codes[i];
      if (c === 0) { attrs = {}; }
      else if (c === 1) { attrs.bold = true; }
      else if (c === 2) { attrs.dim = true; }
      else if (c === 3) { attrs.italic = true; }
      else if (c === 4) { attrs.ul = true; }
      else if (c === 22) { delete attrs.bold; delete attrs.dim; }
      else if (c === 23) { delete attrs.italic; }
      else if (c === 24) { delete attrs.ul; }
      else if (c >= 30 && c <= 37) { attrs.fg = PALETTE[c-30]; }
      else if (c === 38) {
        if (codes[i+1] === 2 && i+4 < codes.length) { attrs.fg = `rgb(${codes[i+2]},${codes[i+3]},${codes[i+4]})`; i+=4; }
        else if (codes[i+1] === 5 && i+2 < codes.length) { attrs.fg = p256(codes[i+2]); i+=2; }
      }
      else if (c === 39) { delete attrs.fg; }
      else if (c >= 40 && c <= 47) { attrs.bg = PALETTE[c-40]; }
      else if (c === 48) {
        if (codes[i+1] === 2 && i+4 < codes.length) { attrs.bg = `rgb(${codes[i+2]},${codes[i+3]},${codes[i+4]})`; i+=4; }
        else if (codes[i+1] === 5 && i+2 < codes.length) { attrs.bg = p256(codes[i+2]); i+=2; }
      }
      else if (c === 49) { delete attrs.bg; }
      else if (c >= 90 && c <= 97)  { attrs.fg = PALETTE[c-82]; }
      else if (c >= 100 && c <= 107) { attrs.bg = PALETTE[c-92]; }
      i++;
    }
  }
  emitText(text.slice(last));
  if (spanOpen) result += '</span>';
  return result;
}

/* --- Menu option detection --- */
function detectMenuOptions(raw) {
  if (!raw) return [];
  const plain = raw
    .replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '')
    .replace(/\x1b[()][AB012]/g, '')
    .replace(/\r/g, '');
  const lines = plain.split('\n').slice(-50);
  const found = new Map();
  for (const line of lines) {
    const m = line.match(/^\s*(?:[❯>◆│]\s*)?(\d+)[.)]\s+(.+?)\s*$/);
    if (m) {
      const num = parseInt(m[1], 10);
      const label = m[2].replace(/\s*\(esc\)\s*$/i, '').trim();
      if (num >= 1 && num <= 9 && label) found.set(num, label);
    }
  }
  if (found.size < 2) return [];
  const opts = [...found.entries()].sort((a, b) => a[0] - b[0]).map(([num, label]) => ({ num, label }));
  if (opts[0].num !== 1) return [];
  for (let i = 0; i < opts.length; i++) if (opts[i].num !== i + 1) return [];
  return opts;
}

function detectCurrentSelection(raw) {
  if (!raw) return 1;
  const plain = raw.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '').replace(/\x1b[()][AB012]/g, '').replace(/\r/g, '');
  const lines = plain.split('\n').slice(-50);
  for (const line of lines) {
    const m = line.match(/^\s*[❯>]\s*(\d+)[.)]/);
    if (m) return parseInt(m[1], 10);
  }
  return 1;
}

};

/* --- Login Screen --- */
function LoginScreen({ onLogin }) {
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    if (!password) return;
    setLoading(true);
    setError('');
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Wrong password'); return; }
      setAuthToken(data.token);
      onLogin();
    } catch {
      setError('Network error — is the pilot running?');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-mark">C</div>
          <div className="login-title">Code Pilot</div>
          <div className="login-sub">Enter password to continue</div>
        </div>
        <div className="form-group">
          <input
            className="form-input"
            type="password"
            placeholder="Password"
            value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
            autoFocus
          />
        </div>
        {error && <div style={{ color: 'var(--error)', fontSize: 13, marginBottom: 12 }}>{error}</div>}
        <button className="btn btn-primary" style={{ width: '100%' }} onClick={handleLogin} disabled={loading || !password}>
          {Icons.lock} {loading ? 'Signing in…' : 'Sign in'}
        </button>
      </div>
    </div>
  );
}

/* --- Status Pill --- */
function StatusPill({ status }) {
  return (
    <span className={`status-pill ${statusCls(status)}${status === 'needs-response' ? ' blink' : ''}`} style={status === 'offline' ? { opacity: 0.55 } : {}}>
      <span className="status-dot" />
      {statusLabel(status)}
    </span>
  );
}

/* --- Sidebar --- */
function Sidebar({ currentScreen, onNavigate, sessionCount, open, onClose, connected }) {

        </div>
        <nav className="sidebar-nav">

          </button>
          <button className={`nav-item ${currentScreen === 'create' ? 'active' : ''}`} onClick={() => { onNavigate('create'); onClose(); }}>

/* --- Sort control --- */
function SortControl({ sortBy, onSortChange }) {

/* --- Snippet lines control --- */
function SnippetControl({ snippetLines, onSnippetChange }) {

        }}>{label}</button>
      ))}

/* --- Sound alert helper --- */
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.35, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
    osc.onended = () => ctx.close();
  } catch {}
}

/* --- Sound control --- */
function SoundControl({ soundOn, onToggle }) {

        }}>{label}</button>
      ))}

  );
}

          color: telegramEnabled === val ? (val ? 'var(--success)' : 'var(--accent)') : 'var(--muted)',
          fontWeight: telegramEnabled === val ? 600 : 400,

}

/* --- Session Card (dashboard grid) --- */
function SessionCard({ session, onNavigate, snippetLines }) {
  const isOffline = session.status === 'offline';
  const [quickMsg, setQuickMsg] = useState('');
  const [sending, setSending] = useState(false);
  const [removing, setRemoving] = useState(false);
  const [ctaHit, setCtaHit] = useState(null);
  const ctaTimerRef = useRef(null);
  const inputRef = useRef(null);

  const handleCardRemove = async (e) => {
    e.stopPropagation();
    if (removing) return;
    if (!confirm(`Remove "${session.name}" from history?`)) return;
    setRemoving(true);
    try {
      await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/history`, { method: 'DELETE' });
    } catch {}
    finally { setRemoving(false); }
  };

  const sendQuick = async () => {
    if (!quickMsg.trim() || sending || isOffline) return;
    setSending(true);
    try {
      await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/send`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: quickMsg }),
      });
      setQuickMsg('');
    } catch {}
    finally { setSending(false); setTimeout(() => inputRef.current?.focus(), 0); }
  };

  const sendMenuOption = async (e, targetNum) => {
    e.stopPropagation();
    setCtaHit(targetNum);
    clearTimeout(ctaTimerRef.current);
    ctaTimerRef.current = setTimeout(() => setCtaHit(null), 2500);
    const delta = targetNum - 1; // option 1 is the ❯ default
    for (let i = 0; i < delta; i++) {
      await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/send`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: 'Down' }),
      });
      await new Promise(r => setTimeout(r, 80));
    }
    await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/send`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'Enter' }),
    });
  };

  const hasMenu = !isOffline && session.status === 'needs-response'
    && session.menuOptions && session.menuOptions.length >= 2;

  return (
    <div
      className={`session-card ${isOffline ? 'offline' : ''}`}
      style={session.color ? { borderLeft: `4px solid ${session.color}` } : {}}
      onClick={() => onNavigate('detail', session)}
    >
      <div className="session-card-header">
        <div className="session-avatar" style={session.color ? { background: session.color + '33' } : {}}>
          {session.emoji || session.name.slice(0, 1).toUpperCase()}
        </div>
        <div style={{ minWidth: 0, flex: 1 }}>
          <div className="session-card-name" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{session.name}</div>
          <div className="session-card-meta" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{session.path}</div>
        </div>
        <StatusPill status={session.status} />
      </div>

      {session.snippet && !isOffline && snippetLines > 0 && (
        <div style={{ margin: '8px 0 0', padding: '5px 8px', background: 'oklch(14% 0.015 50)', borderRadius: 'var(--radius-sm)', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'oklch(65% 0.015 70)', whiteSpace: 'pre-wrap', wordBreak: 'break-all', lineHeight: 1.5 }}>
          {session.snippet.split('\n').slice(-snippetLines).join('\n')}
        </div>
      )}

      <div className="session-card-body">
        <div className="session-card-field"><div className="session-card-field-label">Started</div><div className="session-card-field-value">{relativeTime(session.startedAt)}</div></div>
        {session.status === 'limit' && session.resumeAt
          ? <div className="session-card-field"><div className="session-card-field-label" style={{ color: 'var(--warning)' }}>Resets</div><div className="session-card-field-value" style={{ color: 'var(--warning)', fontWeight: 600 }}>{session.resetTime || relativeTime(session.resumeAt)}</div></div>
          : <div className="session-card-field"><div className="session-card-field-label">Tokens</div><div className="session-card-field-value">{formatTokens(session.tokens)}</div></div>
        }
      </div>

      {(session.queueLength > 0 || session.autoFeed) && (
        <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px solid var(--border)', fontSize: 11, color: 'var(--muted)', display: 'flex', alignItems: 'center', gap: 4 }}>
          {session.autoFeed ? '⚡' : '⏳'} {session.queueLength} message{session.queueLength !== 1 ? 's' : ''} queued{session.autoFeed ? ' · auto-feed' : ''}
        </div>
      )}

      {hasMenu && (
        <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column', gap: 4 }} onClick={e => e.stopPropagation()}>
          {session.menuOptions.map(opt => (
            <button
              key={opt.num}
              className={`menu-cta-btn${ctaHit === opt.num ? ' hit' : ''}`}
              title={opt.label}
              disabled={ctaHit !== null}
              onClick={e => sendMenuOption(e, opt.num)}
            >
              <span className="menu-cta-num">{ctaHit === opt.num ? '✓' : opt.num}</span>
              <span className="menu-cta-text">{opt.label}</span>
            </button>
          ))}
        </div>
      )}

      {!isOffline && (
        <div style={{ marginTop: 8 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: 'flex', gap: 4 }}>
            <input
              ref={inputRef}
              className="form-input"
              style={{ fontSize: 11, padding: '4px 8px', flex: 1, minWidth: 0 }}
              placeholder="Quick reply…"
              value={quickMsg}
              onChange={e => setQuickMsg(e.target.value)}
              onKeyDown={e => { e.stopPropagation(); if (e.key === 'Enter') sendQuick(); }}
              disabled={sending}
              spellCheck={false}
              autoComplete="off"
            />
            <button className="btn btn-sm" style={{ flexShrink: 0 }} onClick={e => { e.stopPropagation(); sendQuick(); }} disabled={sending || !quickMsg.trim()}>→</button>
          </div>
        </div>
      )}
      {isOffline && (
        <div style={{ marginTop: 8, display: 'flex', gap: 6 }} onClick={e => e.stopPropagation()}>
          <button className="btn btn-sm btn-primary" style={{ flex: 1 }} onClick={e => { e.stopPropagation(); onNavigate('detail', session); }}>↺ Respawn</button>
          <button className="btn btn-sm" style={{ color: 'var(--error)', flexShrink: 0 }} onClick={handleCardRemove} disabled={removing} title="Remove from history">
            {Icons.trash}
          </button>
        </div>
      )}
    </div>
  );
}

/* --- SysInfo minibar --- */
function fmtTok(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(0) + 'k';
  return String(n);
}

function SysInfoBar() {
  const [info, setInfo] = useState(null);
  const [usage, setUsage] = useState(null);
  useEffect(() => {
    let mounted = true;
    const fetchSys   = () => apiFetch('/api/sysinfo', { cache: 'no-store' }).then(r => r.json()).then(d => { if (mounted) setInfo(d); }).catch(() => {});
    const fetchUsage = () => apiFetch('/api/usage',   { cache: 'no-store' }).then(r => r.json()).then(d => { if (mounted) setUsage(d); }).catch(() => {});
    fetchSys(); fetchUsage();
    const t1 = setInterval(fetchSys,   5000);
    const t2 = setInterval(fetchUsage, 60000);
    return () => { mounted = false; clearInterval(t1); clearInterval(t2); };
  }, []);
  const fmt = (bytes) => {
    const g = bytes / 1073741824;
    return g >= 1 ? g.toFixed(1) + ' GB' : (bytes / 1048576).toFixed(0) + ' MB';
  };
  const barColor = (pct) => pct > 85 ? 'var(--error)' : pct > 60 ? 'var(--warning)' : 'var(--success)';
  const memPct = info?.totalMem ? Math.round(info.usedMem / info.totalMem * 100) : 0;
  const diskPct = info?.diskTotal ? Math.round(info.diskUsed / info.diskTotal * 100) : 0;
  if (!info && !usage) return null;
  return (
    <div className="sysinfo-bar">
      {info && <>
        <div className="sysinfo-item">
          <span className="sysinfo-label">CPU</span>
          <div className="sysinfo-bar-track"><div className="sysinfo-bar-fill" style={{ width: info.cpuPct + '%', background: barColor(info.cpuPct) }} /></div>
          <span>{info.cpuPct}%</span>
        </div>
        <div className="sysinfo-item">
          <span className="sysinfo-label">RAM</span>
          <div className="sysinfo-bar-track"><div className="sysinfo-bar-fill" style={{ width: memPct + '%', background: barColor(memPct) }} /></div>
          <span>{fmt(info.usedMem)} / {fmt(info.totalMem)}</span>
        </div>
        {info.diskTotal > 0 && (
          <div className="sysinfo-item">
            <span className="sysinfo-label">Disk</span>
            <div className="sysinfo-bar-track"><div className="sysinfo-bar-fill" style={{ width: diskPct + '%', background: barColor(diskPct) }} /></div>
            <span>{fmt(info.diskUsed)} / {fmt(info.diskTotal)}</span>
          </div>
        )}
      </>}
      {usage && usage.limitResetAt && (
        <div className="sysinfo-item" style={{ color: 'var(--warning)', fontWeight: 600, gap: 6 }}>
          <span>⚠ LIMIT</span>
          <span style={{ fontWeight: 400, fontSize: 11 }}>
            resets {usage.limitResetTime || relativeTime(usage.limitResetAt)}
          </span>
        </div>
      )}
      {usage && (
        <div className="sysinfo-item" style={{ marginLeft: 'auto' }}>
          <span className="sysinfo-label">7d</span>
          <span title={`Output: ${fmtTok(usage.weekOutput)} · Input: ${fmtTok(usage.weekInput)} · Cache read: ${fmtTok(usage.weekCacheRead)} · Messages: ${usage.weekMessages} · Sessions: ${usage.weekSessions}`}>
            {fmtTok(usage.weekOutput)}out
            {usage.weekMessages > 0 && <span style={{ color: 'var(--muted)', marginLeft: 5 }}>· {usage.weekMessages}msg</span>}
          </span>
        </div>
      )}
    </div>
  );
}

/* --- Session Detail --- */
function SessionDetailScreen({ session, onBack, onKilled, onRespawned }) {
  const isOffline = session.status === 'offline';
  const [output, setOutput] = useState('');
  const [msg, setMsg] = useState('');
  const [sending, setSending] = useState(false);
  const [emoji, setEmoji] = useState(session.emoji || '');
  const [color, setColor] = useState(session.color || '');
  const [killing, setKilling] = useState(false);
  const [killError, setKillError] = useState('');
  const [respawning, setRespawning] = useState(false);
  const [respawnError, setRespawnError] = useState('');
  const [copyOk, setCopyOk] = useState(false);
  const [finderOk, setFinderOk] = useState(false);
  const [activeTab, setActiveTab] = useState('terminal');
  const [connecting, setConnecting] = useState(!isOffline);
  const [pollError, setPollError] = useState(false);
  const terminalRef = useRef(null);
  const inputRef = useRef(null);
  const pollNowRef = useRef(() => {});
  const userScrolledRef = useRef(false);
  const cmdHistoryRef = useRef([]);
  const historyIdxRef = useRef(-1);
  const [autoYes, setAutoYes] = useState(false);
  const [parsedOptions, setParsedOptions] = useState([]);
  const [parsedSource, setParsedSource] = useState(null);
  const [parseLoading, setParseLoading] = useState(false);
  const [ctaHit, setCtaHit] = useState(null);
  const ctaTimerRef = useRef(null);
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 768);
  const [termFontSize, setTermFontSize] = useState(() => {
    const s = localStorage.getItem('pilot-term-fsz');
    return s ? Math.max(10, Math.min(18, parseInt(s, 10))) : 12;
  });

  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);

  const changeFontSize = (d) => setTermFontSize(prev => {
    const next = Math.max(10, Math.min(18, prev + d));
    localStorage.setItem('pilot-term-fsz', next);
    return next;
  });

  const copyAttachCmd = () => {
    const cmd = `tmux attach -t ${session.name}`;
    navigator.clipboard?.writeText(cmd).then(() => {
      setCopyOk(true);
      setTimeout(() => setCopyOk(false), 2000);
    }).catch(() => {});
  };

  const openFinder = async () => {
    try {
      await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/open-finder`, { method: 'POST' });
      setFinderOk(true);
      setTimeout(() => setFinderOk(false), 1500);
    } catch {}
  };

  // Sync label fields when navigating between sessions
  useEffect(() => {
    setEmoji(session.emoji || '');
    setColor(session.color || '');
    userScrolledRef.current = false; // reset scroll lock on session change
  }, [session.name]);

  const saveMeta = useCallback((e, c) => {
    apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/meta`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emoji: e, color: c }),
    }).catch(() => {});
  }, [session.name]);

  // Auto-focus input on mount and when session changes; reset to terminal tab
  useEffect(() => {
    setActiveTab('terminal');
    if (!isOffline) setTimeout(() => inputRef.current?.focus(), 50);
  }, [session.name, isOffline]);

  // Resize tmux pane to match the web terminal viewport
  useEffect(() => {
    if (isOffline || !terminalRef.current) return;
    const el = terminalRef.current;
    let debounce = null;

    const sendResize = () => {
      // Measure a single monospace character to get cell dimensions
      const probe = document.createElement('span');
      probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;' +
        `font-family:var(--font-mono);font-size:${termFontSize}px;line-height:1.5;`;
      probe.textContent = 'M';
      el.appendChild(probe);
      const charW = probe.getBoundingClientRect().width || 7.2;
      const charH = probe.getBoundingClientRect().height || 18;
      el.removeChild(probe);

      const pad = 16; // matches .terminal-body padding
      const cols = Math.max(40, Math.floor((el.clientWidth  - pad * 2) / charW));
      const rows = Math.max(10, Math.floor((el.clientHeight - pad * 2) / charH));

      apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/resize`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cols, rows }),
      }).catch(() => {});
    };

    const onResize = () => {
      clearTimeout(debounce);
      debounce = setTimeout(sendResize, 80);
    };

    // Initial resize after layout settles, then watch for container size changes
    debounce = setTimeout(sendResize, 150);
    const ro = new ResizeObserver(onResize);
    ro.observe(el);
    return () => { ro.disconnect(); clearTimeout(debounce); };
  }, [session.name, isOffline, termFontSize]);

  // Poll terminal output at near-realtime cadence
  useEffect(() => {
    if (isOffline) {
      setConnecting(false);
      setPollError(false);
      return;
    }
    let mounted = true;
    let inFlight = false;

    const poll = () => {
      if (inFlight) return;
      inFlight = true;
      apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/output`, { cache: 'no-store' })
        .then(r => r.json())
        .then(d => {
          if (!mounted) return;
          setOutput(d.output || '');
          setConnecting(false);
          setPollError(false);
        })
        .catch(e => {
          if (!mounted) return;
          if (e && e.message !== 'Unauthorized') console.error('[ccp] output poll error:', e);
          setConnecting(false);
          setPollError(true);
        })
        .finally(() => {
          inFlight = false;
        });
    };

    setConnecting(true);
    pollNowRef.current = poll;
    poll();
    const t = setInterval(poll, 600);
    return () => {
      mounted = false;
      pollNowRef.current = () => {};
      clearInterval(t);
    };
  }, [session.name, isOffline]);

  // Auto-scroll to bottom only when the user hasn't scrolled up manually.
  // "Near bottom" = within 60px, so a new line doesn't lock you in place mid-read.
  useEffect(() => {
    const el = terminalRef.current;
    if (!el || userScrolledRef.current) return;
    el.scrollTop = el.scrollHeight;
  }, [output]);

  // Track whether the user has scrolled away from the bottom
  useEffect(() => {
    const el = terminalRef.current;
    if (!el) return;
    const onScroll = () => {
      const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
      userScrolledRef.current = !atBottom;
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  // Auto-yes: press Enter automatically when Claude needs a response (confirms option 1 in permission menus)
  useEffect(() => {
    if (!autoYes || isOffline || session.status !== 'needs-response') return;
    const t = setTimeout(async () => {
      try {
        await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: 'Enter' }),
        });
        pollNowRef.current();
      } catch {}
    }, 800);
    return () => clearTimeout(t);
  }, [autoYes, session.status, session.name, isOffline]);

  // Auto-resize textarea as content grows
  useEffect(() => {
    const el = inputRef.current;
    if (!el) return;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }, [msg]);

  const sendMessage = async () => {
    if (!msg.trim() || sending || isOffline) return;
    const text = msg.trim();
    setSending(true);
    try {
      await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
      });
      cmdHistoryRef.current = [text, ...cmdHistoryRef.current].slice(0, 100);
      historyIdxRef.current = -1;
      setMsg('');
      pollNowRef.current();
    } catch {
    } finally {
      setSending(false);
      setTimeout(() => inputRef.current?.focus(), 0);
    }
  };

  const sendKey = async (key) => {
    try {
      await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key }),
      });
      pollNowRef.current();
    } catch {}
    setTimeout(() => inputRef.current?.focus(), 0);
  };

  // Regex-parsed menu options from the current terminal snapshot (fast, synchronous)
  const menuOptions = React.useMemo(() => detectMenuOptions(output), [output]);
  const displayOptions = menuOptions.length >= 2 ? menuOptions : parsedOptions;

  // Reset server-parsed options when session changes or regex starts working
  useEffect(() => { setParsedOptions([]); setParsedSource(null); setParseLoading(false); }, [session.name]);
  useEffect(() => { if (menuOptions.length >= 2) { setParsedOptions([]); setParsedSource(null); } }, [menuOptions.length]);
  // Clear when session leaves needs-response state
  useEffect(() => { if (session.status !== 'needs-response') { setParsedOptions([]); setParsedSource(null); setParseLoading(false); setCtaHit(null); clearTimeout(ctaTimerRef.current); } }, [session.status]);

  const parseWithModel = async () => {
    setParseLoading(true);
    try {
      const r = await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/menu`, { cache: 'no-store' });
      const d = await r.json();
      setParsedOptions(d.options || []);
      setParsedSource(d.source || null);
    } catch {}
    finally { setParseLoading(false); }
  };

  const sendMenuOption = async (targetNum) => {
    setCtaHit(targetNum);
    clearTimeout(ctaTimerRef.current);
    ctaTimerRef.current = setTimeout(() => setCtaHit(null), 2500);
    setParsedOptions([]);
    const current = detectCurrentSelection(output);
    const delta = targetNum - current;
    if (delta !== 0) {
      const key = delta > 0 ? 'Down' : 'Up';
      for (let i = 0; i < Math.abs(delta); i++) {
        await sendKey(key);
        await new Promise(r => setTimeout(r, 80));
      }
    }
    await sendKey('Enter');
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      // Ctrl/Cmd+Enter: insert newline at cursor
      e.preventDefault();
      const el = e.target;
      const s = el.selectionStart, end = el.selectionEnd;
      const next = msg.slice(0, s) + '\n' + msg.slice(end);
      setMsg(next);
      requestAnimationFrame(() => { el.selectionStart = el.selectionEnd = s + 1; });
      return;
    }
    if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); sendKey('Enter'); return; }
    if (e.key === 'Enter' && !msg.trim()) { e.preventDefault(); sendKey('Enter'); return; }
    if (e.key === 'Enter') { e.preventDefault(); sendMessage(); return; }
    // Arrow keys: forward to tmux when input is empty (navigate Claude menus),
    // navigate command history when there's text in the input.
    if (e.key === 'ArrowUp') {
      if (!msg) { e.preventDefault(); sendKey('Up'); return; }
      e.preventDefault();
      const hist = cmdHistoryRef.current;
      if (!hist.length) return;
      const next = Math.min(historyIdxRef.current + 1, hist.length - 1);
      historyIdxRef.current = next;
      setMsg(hist[next] || '');
      return;
    }
    if (e.key === 'ArrowDown') {
      if (!msg) { e.preventDefault(); sendKey('Down'); return; }
      e.preventDefault();
      const next = Math.max(historyIdxRef.current - 1, -1);
      historyIdxRef.current = next;
      setMsg(next === -1 ? '' : cmdHistoryRef.current[next] || '');
      return;
    }
    if (e.key === 'Tab') { e.preventDefault(); sendKey('Tab'); return; }
    // Ctrl+C / Ctrl+D only when input is empty — otherwise let the browser handle selection etc.
    if (e.ctrlKey && e.key === 'c' && !msg) { e.preventDefault(); sendKey('C-c'); return; }
    if (e.ctrlKey && e.key === 'd' && !msg) { e.preventDefault(); sendKey('C-d'); return; }
    // Ctrl+U: clear current line (readline convention)
    if (e.ctrlKey && e.key === 'u') { e.preventDefault(); setMsg(''); historyIdxRef.current = -1; return; }
    // Ctrl+L: clear screen
    if (e.ctrlKey && e.key === 'l') { e.preventDefault(); sendKey('C-l'); return; }
  };

  const handleKill = async () => {
    if (!confirm(`End session "${session.name}"?`)) return;
    setKilling(true);
    setKillError('');
    try {
      const res = await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}`, { method: 'DELETE' });
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        setKillError(d.error || 'Failed to end session');
        setKilling(false);
        return;
      }
      onKilled();
    } catch (e) {
      if (e && e.message !== 'Unauthorized') setKillError('Network error');
      setKilling(false);
    }
  };

  const handleRespawn = async () => {
    if (respawning) return;
    setRespawning(true);
    setRespawnError('');
    try {
      const res = await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/respawn`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) {
        setRespawnError(data.error || 'Failed to respawn');
        return;
      }
      onRespawned(data);
    } catch (e) {
      if (e.message !== 'Unauthorized') setRespawnError('Network error');
    } finally {
      setRespawning(false);
    }
  };

  const handleRemove = async () => {
    if (!confirm(`Remove "${session.name}" from history? This cannot be undone.`)) return;
    try {
      await apiFetch(`/api/sessions/${encodeURIComponent(session.name)}/history`, { method: 'DELETE' });
      onKilled();
    } catch (e) {
      if (e.message !== 'Unauthorized') alert('Failed to remove session');
    }
  };

  // Render terminal HTML (ANSI → HTML, with plain-text fallback)
  let _termHtml = '';
  if (output) {
    try {
      _termHtml = ansiToHtml(output);
    } catch(e) {
      console.error('[ccp] ansiToHtml error:', e);
      _termHtml = output.replace(/\x1b\[[0-9;]*m/g,'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  }

  // Terminal height: fill viewport minus chrome
  const terminalStyle = isMobile
    ? { height: 'calc(100dvh - 160px)', minHeight: 200 }
    : { height: 'calc(100vh - 280px)', minHeight: 320 };

  return (
    <div>
      <button className="back-link" onClick={onBack}>{Icons.arrow} Back</button>

      <div className="detail-header">
        <div>
          <div className="detail-meta" style={{ maxWidth: 480, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{session.path}</div>
        </div>
        <div className="detail-actions">
          <button className="btn btn-sm" onClick={openFinder} title="Open in Finder">
            {finderOk ? '✓' : '📂'} Finder
          </button>
          {isOffline && (
            <>
              <button className="btn btn-sm btn-primary" onClick={handleRespawn} disabled={respawning}>
                {respawning ? 'Respawning…' : '↺ Respawn'}
              </button>
              <button className="btn btn-sm" style={{ color: 'var(--error)' }} onClick={handleRemove} title="Remove from history">
                {Icons.trash} Remove
              </button>
              {respawnError && (
                <span style={{ color: 'var(--error)', fontSize: 12, alignSelf: 'center' }}>
                  {respawnError}
                </span>
              )}
            </>
          )}
          {!isOffline && (
            <button
              className="btn btn-sm"
              onClick={() => setAutoYes(a => !a)}
              title="Auto-yes: automatically press Enter when Claude shows a permission prompt"
              style={autoYes ? { background: 'var(--success-soft)', color: 'var(--success)', borderColor: 'var(--success)' } : {}}
            >
              {autoYes ? '⚡ Auto-yes' : 'Auto-yes'}
            </button>
          )}
          {!isOffline && (
            <button className="btn btn-sm" onClick={copyAttachCmd} title={`tmux attach -t ${session.name}`}>
              {copyOk ? '✓ Copied' : '⊞ New Terminal'}
            </button>
          )}
          {!isOffline && (
            <button className="btn btn-sm" style={{ color: 'var(--error)' }} onClick={handleKill} disabled={killing}>
              {Icons.trash} {killing ? 'Ending…' : 'End'}
            </button>
          )}
          {!isOffline && killError && (
            <span style={{ color: 'var(--error)', fontSize: 12, alignSelf: 'center' }}>
              {killError}
            </span>
          )}
        </div>
      </div>

      <div className="tab-bar">
        <button className={`tab-btn ${activeTab === 'terminal' ? 'active' : ''}`} onClick={() => setActiveTab('terminal')}>⬛ Terminal</button>
        {isMobile && <button className={`tab-btn ${activeTab === 'info' ? 'active' : ''}`} onClick={() => setActiveTab('info')}>ℹ Info</button>}
        {isMobile && <button className={`tab-btn ${activeTab === 'queue' ? 'active' : ''}`} onClick={() => setActiveTab('queue')}>≡ Queue</button>}
        <button className={`tab-btn ${activeTab === 'git' ? 'active' : ''}`} onClick={() => setActiveTab('git')}>± Git</button>
      </div>

      {activeTab === 'terminal' && (() => {
        const termEl = (
          <div className="terminal" style={terminalStyle}>
            <div className="terminal-header">
              <span className="terminal-dot" style={{ background: '#ff5f57' }} />
              <span className="terminal-dot" style={{ background: '#febc2e' }} />
              <span className="terminal-dot" style={{ background: '#28c840' }} />
              <span className="terminal-title">{session.name}</span>
              <span style={{ flex: 1 }} />
              <div style={{ display: 'flex', alignItems: 'center', gap: 3, marginRight: 8 }}>
                <button className="terminal-fsz-btn" onClick={() => changeFontSize(-1)} title="Decrease font size">A-</button>
                <span className="terminal-fsz-val">{termFontSize}</span>
                <button className="terminal-fsz-btn" onClick={() => changeFontSize(1)} title="Increase font size">A+</button>
              </div>
              <StatusPill status={session.status} />
            </div>

            <div
              className="terminal-body"
              ref={terminalRef}
              onClick={() => { if (!window.getSelection()?.toString()) inputRef.current?.focus(); }}
              style={{ cursor: isOffline ? 'default' : 'text', fontSize: termFontSize, ...(isMobile ? { paddingBottom: 130 } : {}) }}
              dangerouslySetInnerHTML={{ __html:
                isOffline
                  ? '<span style="color:oklch(50% 0.018 50)">Session is offline — no output available.</span>'
                  : _termHtml
                    ? _termHtml + '<span style="opacity:0.4">▊</span>'
                    : (connecting
                        ? '<span style="color:oklch(50% 0.018 50)">Connecting…</span>'

                            ? '<span style="color:oklch(64% 0.20 28)">Can\'t read terminal output. Retrying…</span>'
                            : '<span style="color:oklch(50% 0.018 50)">No output yet.</span>'))

            />

            {/* Numbered-choice CTA strip — appears when Claude shows a 1/2/3 menu */}

              <div className="menu-cta-strip">
                {parsedSource === 'model' && displayOptions.length > 0 && (

            {!isOffline && (

                <div className="terminal-input-row">
                  <span className="terminal-prompt-char">❯</span>
                  <textarea
                    ref={inputRef}
                    className="terminal-input"
                    placeholder="send a message… (Enter = send, Ctrl+Enter = new line)"
                    value={msg}
                    rows={1}
                    onChange={e => setMsg(e.target.value)}
                    onKeyDown={handleKeyDown}
                    disabled={sending}
                    spellCheck={false}
                    autoCorrect="off"
                  />
                  <button className="btn-key btn-key-send" onClick={sendMessage} disabled={!msg.trim() || sending || isOffline} title="Send (Enter)">↵ Send</button>
                </div>
                <div className="terminal-keys">

                  <button className="btn-key" onClick={() => sendKey('Down')} title="Arrow Down — navigate Claude menus">↓</button>

                  <button className="btn-key" onClick={() => sendKey('C-d')} title="Ctrl+D — EOF / exit (or press Ctrl+D in empty input)">^D</button>
                  <button className="btn-key" onClick={() => sendKey('Enter')} title="Send bare Enter to tmux">↵</button>
                </div>

        return isMobile ? termEl : (

            {termEl}

              <div className="card">
                <h3>Session Info</h3>
                <div className="info-row"><span className="info-label">Status</span><StatusPill status={session.status} /></div>
                <div className="info-row"><span className="info-label">Agent</span><span className="info-value" style={{ fontSize: 11 }}>{session.command || 'claude'}</span></div>
                <div className="info-row"><span className="info-label">Started</span><span className="info-value" style={{ fontSize: 11 }}>{relativeTime(session.startedAt)}</span></div>

                {session.status === 'limit' && session.resumeAt && (
                  <div className="info-row"><span className="info-label">Resumes</span><span className="info-value" style={{ fontSize: 11, color: 'var(--warning)' }}>{relativeTime(session.resumeAt)}</span></div>
                )}

                <div className="info-row" style={{ alignItems: 'flex-start', paddingTop: 10, marginTop: 4, borderTop: '1px solid var(--border)' }}>
                  <span className="info-label" style={{ paddingTop: 4 }}>Label</span>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>

            <div className="info-row" style={{ alignItems: 'flex-start', paddingTop: 10, marginTop: 4, borderTop: '1px solid var(--border)' }}>

/* --- Create Session --- */
function CreateSessionScreen({ onBack, onCreated }) {
  const [name, setName] = useState('');
  const [path, setPath] = useState('');
  const [prompt, setPrompt] = useState('');
  const [command, setCommand] = useState('claude');
  const [customCommand, setCustomCommand] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const resolvedCommand = command === 'custom' ? customCommand.trim() : command;

  const handleCreate = async () => {
    if (!name.trim() || !path.trim()) { setError('Session name and working directory are required.'); return; }
    if (command === 'custom' && !customCommand.trim()) { setError('Enter a custom command.'); return; }
    setError('');
    setLoading(true);
    try {
      const res = await apiFetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), path: path.trim(), prompt: prompt.trim() || undefined, command: resolvedCommand }),
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Failed to create session.'); return; }
      onCreated(data);
    } catch (e) {
      if (e.message !== 'Unauthorized') setError('Network error.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="create-layout">
      <button className="back-link" onClick={onBack}>{Icons.arrow} Back</button>
      <h2 className="section-title" style={{ marginBottom: 20, fontSize: 18 }}>New Session</h2>

      <div className="form-group">
        <label className="form-label">Session name</label>
        <input className="form-input" placeholder="e.g. refactor-auth-flow" value={name} onChange={e => setName(e.target.value)} />
        <div className="form-hint">Used as the tmux session name. Lowercase with hyphens.</div>
      </div>
      <div className="form-group">
        <label className="form-label">Working directory</label>
        <input className="form-input" placeholder="~/projects/app" value={path} onChange={e => setPath(e.target.value)} />
      </div>
      <div className="form-group">
        <label className="form-label">Agent</label>
        <select className="form-select" value={command} onChange={e => setCommand(e.target.value)}>
          <option value="claude">claude (Claude Code)</option>
          <option value="opencode">opencode</option>
          <option value="custom">custom…</option>
        </select>
        {command === 'custom' && (
          <input className="form-input" style={{ marginTop: 8 }} placeholder="e.g. aider" value={customCommand} onChange={e => setCustomCommand(e.target.value)} />
        )}
        {command === 'opencode' && (
          <div className="form-hint">Status indicators (running/idle) are claude-only — opencode sessions will show as idle but are fully controllable.</div>
        )}
      </div>
      <div className="form-group">
        <label className="form-label">Initial prompt <span style={{ fontWeight: 400, color: 'var(--muted)' }}>(optional)</span></label>
        <textarea className="form-textarea" placeholder="What should the agent work on?" value={prompt} onChange={e => setPrompt(e.target.value)} rows={4} />
        <div className="form-hint">Sent 2 seconds after the session starts.</div>
      </div>
      {error && <div style={{ marginBottom: 16, padding: '10px 14px', background: 'var(--error-soft)', color: 'var(--error)', borderRadius: 'var(--radius-sm)', fontSize: 13 }}>{error}</div>}
      <div className="form-actions">
        <button className="btn" onClick={onBack}>Cancel</button>
        <button className="btn btn-primary" onClick={handleCreate} disabled={loading}>{loading ? 'Creating…' : 'Create & Start'}</button>
      </div>
    </div>
  );
}

/* --- Broadcast Card --- */
function BroadcastCard({ activeSessions }) {
  const [msg, setMsg] = useState('');
  const [sending, setSending] = useState(false);
  const [result, setResult] = useState(null);

  const broadcast = async () => {
    if (!msg.trim() || sending || activeSessions === 0) return;
    setSending(true);
    try {
      const res = await apiFetch('/api/broadcast', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
      });
      const data = await res.json();
      if (res.ok) {
        setResult(`Sent to ${data.sent}`);
        setMsg('');
        setTimeout(() => setResult(null), 3000);
      }
    } catch {}
    finally { setSending(false); }
  };

  return (
    <div className="stat-card" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div className="stat-label">Broadcast</div>
      <input
        className="form-input"
        placeholder={activeSessions === 0 ? 'No active sessions' : `→ all ${activeSessions} sessions…`}
        value={msg}
        onChange={e => setMsg(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && broadcast()}
        disabled={activeSessions === 0}
        style={{ fontSize: 12, padding: '5px 8px' }}
      />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button className="btn btn-primary btn-sm" onClick={broadcast} disabled={sending || !msg.trim() || activeSessions === 0} style={{ fontSize: 11 }}>
          {sending ? '…' : 'Send all'}
        </button>
        {result && <span style={{ fontSize: 11, color: 'var(--success)' }}>{result}</span>}
      </div>
    </div>
  );
}
